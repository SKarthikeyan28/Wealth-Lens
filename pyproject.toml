[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I"]   # pycodestyle errors, pyflakes, isort

[tool.ruff.lint.isort]
known-first-party = ["backend"]

[tool.mypy]
strict = true
python_version = "3.12"
files = ["backend"]

# Migration files are generated artifacts; allow untyped library calls (e.g. JSONB()).
[[tool.mypy.overrides]]
module = "backend.alembic.versions.*"
disallow_untyped_calls = false

# cvxpy ships an incomplete py.typed marker; skip following its imports and
# ignore its types so strict mypy does not flag cp.quad_form / cp.psd_wrap etc.
[[tool.mypy.overrides]]
module = "cvxpy.*"
ignore_missing_imports = true
follow_imports = "skip"

[tool.pytest.ini_options]
testpaths = ["backend/tests"]
