# render.yaml — Wealth-Lens backend blueprint (Phase 6.3)
databases:
  - name: wealth-lens-db
    databaseName: wealthlens
    user: wealthlens
    plan: free            # free Postgres expires after 90 days — see note below

services:
  # Managed Redis (Render now labels this "Key Value" in the dashboard)
  - type: redis
    name: wealth-lens-redis
    plan: free
    ipAllowList: []       # empty = internal-only, no public access

  - type: web
    name: wealth-lens-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile.prod
    dockerContext: .
    plan: free
    healthCheckPath: /health
    # Runs AFTER build, BEFORE traffic shifts to the new version.
    preDeployCommand: "alembic upgrade head"
    envVars:
      # Wired automatically from the managed resources above:
      - key: DATABASE_URL
        fromDatabase:
          name: wealth-lens-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: wealth-lens-redis
          property: connectionString
      # Generated once by Render, then stable:
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      # Plain config:
      - key: RATELIMIT_ENABLED
        value: "true"
      - key: JWT_ACCESS_EXPIRE_MINUTES
        value: "15"
      - key: JWT_REFRESH_EXPIRE_DAYS
        value: "7"
      - key: CHATBOT_MODEL
        value: "claude-opus-4-8"
      # Secrets YOU set in the dashboard (never in git) — sync:false:
      - key: TOTP_ENCRYPTION_KEY      # must be a valid Fernet key (see Step 4)
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      - key: CORS_ORIGINS             # set to your Vercel URL once it exists
        sync: false